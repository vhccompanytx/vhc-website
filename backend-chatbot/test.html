<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VHC Chatbot Test</title>
  <style>
    :root {
      --navy: #0b1332;
      --blue: #1b2d6e;
      --gold: #c9a035;
      --surface: #f4f6f9;
      --border: #d8dce8;
      --text: #1a1f2e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(180deg, #eef2f8 0%, #f8fafc 100%);
      color: var(--text);
    }
    .shell { max-width: 760px; margin: 40px auto; padding: 0 16px; }
    .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 18px 48px rgba(11, 19, 50, 0.12);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, var(--navy), var(--blue));
      color: white;
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .header h1 { margin: 0 0 4px; font-size: 1.4rem; }
    .header p { margin: 0; color: rgba(255,255,255,0.72); font-size: 0.95rem; }
    .toolbar { display: flex; gap: 10px; align-items: center; }
    .toolbar select, .toolbar button, #msg {
      border-radius: 999px;
      border: 1px solid var(--border);
      font: inherit;
    }
    .toolbar select, .toolbar button { padding: 10px 14px; }
    .toolbar button { background: white; color: var(--navy); cursor: pointer; }
    .toolbar button:hover { background: #f7f9fc; }
    #chat {
      height: 420px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--surface);
    }
    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .user {
      align-self: flex-end;
      background: var(--navy);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bot {
      align-self: flex-start;
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .error {
      align-self: flex-start;
      background: #fff1f2;
      color: #9f1239;
      border: 1px solid #fecdd3;
    }
    .confirm {
      align-self: stretch;
      background: #f7f9fc;
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
    }
    .composer {
      padding: 16px;
      background: white;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    #msg { flex: 1; padding: 12px 16px; outline: none; }
    #msg:focus { border-color: var(--blue); }
    .send {
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--blue), var(--navy));
      color: white;
      cursor: pointer;
      font: inherit;
    }
    .send:hover { filter: brightness(1.05); }
    #meta {
      margin-top: 12px;
      font-size: 12px;
      color: #667085;
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="header">
        <div>
          <h1>VHC Company Services Chatbot</h1>
          <p id="subtitle">Bilingual lead capture test for the website assistant.</p>
        </div>
        <div class="toolbar">
          <select id="lang">
            <option value="en">English</option>
            <option value="es">Español</option>
          </select>
          <button type="button" id="resetBtn">Reset</button>
        </div>
      </div>
      <div id="chat"></div>
      <div class="composer">
        <input id="msg" autocomplete="off" />
        <button class="send" type="button" id="sendBtn">Send</button>
      </div>
    </div>
    <div id="meta"></div>
  </div>
  <script>
    const sessionId = "session_" + Math.random().toString(36).slice(2, 10);
    const chat = document.getElementById("chat");
    const metaEl = document.getElementById("meta");
    const langEl = document.getElementById("lang");
    const msgEl = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");
    const resetBtn = document.getElementById("resetBtn");
    const subtitleEl = document.getElementById("subtitle");

    const copy = {
      en: {
        subtitle: "Bilingual lead capture test for the website assistant.",
        welcome: "Hello. I am the VHC Company Services assistant. How can I help you today?",
        placeholder: "Type your message...",
        send: "Send",
        reset: "Reset",
        confirmTitle: "Information sent to VHC",
        confirmBody: (name) => `We received your details, ${name}. A specialist will contact you soon.`,
        serverError: "Server error: ",
        connectError: "Could not connect to the server. Is node server.js running?",
      },
      es: {
        subtitle: "Prueba bilingue de captacion de leads para el asistente del sitio web.",
        welcome: "Hola. Soy el asistente de VHC Company Services. ¿En que puedo ayudarte hoy?",
        placeholder: "Escribe tu mensaje...",
        send: "Enviar",
        reset: "Reiniciar",
        confirmTitle: "Informacion enviada a VHC",
        confirmBody: (name) => `Hemos recibido tus datos, ${name}. Un asesor te contactara pronto.`,
        serverError: "Error del servidor: ",
        connectError: "No se pudo conectar con el servidor. ¿Esta corriendo node server.js?",
      }
    };

    function currentCopy() {
      return copy[langEl.value] || copy.en;
    }

    function applyCopy() {
      const text = currentCopy();
      subtitleEl.textContent = text.subtitle;
      msgEl.placeholder = text.placeholder;
      sendBtn.textContent = text.send;
      resetBtn.textContent = text.reset;
    }

    function clearChat() {
      chat.innerHTML = "";
      metaEl.style.display = "none";
      metaEl.textContent = "";
      addMsg(currentCopy().welcome, "bot");
    }

    function addMsg(text, role) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function send(reset = false) {
      const message = reset ? "__reset__" : msgEl.value.trim();
      if (!reset && !message) return;
      if (!reset) {
        msgEl.value = "";
        addMsg(message, "user");
      }
      const typing = addMsg("...", "bot");
      try {
        const res = await fetch("http://localhost:3000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, sessionId, lang: langEl.value, reset })
        });
        const data = await res.json();
        typing.remove();
        if (reset) {
          clearChat();
          return;
        }
        if (data.error) {
          addMsg(currentCopy().serverError + data.error, "error");
          return;
        }
        addMsg(data.reply, "bot");
        if (data.meta?.leadJustSent) {
          const name = data.meta.collected?.nombre || "Customer";
          const box = document.createElement("div");
          box.className = "confirm";
          box.innerHTML = `<strong>${currentCopy().confirmTitle}</strong><br>${currentCopy().confirmBody(name)}`;
          chat.appendChild(box);
          chat.scrollTop = chat.scrollHeight;
        }
        if (data.meta) {
          const collected = data.meta.collected || {};
          const items = Object.entries(collected).map(([key, value]) => `${key}: ${value}`).join(" | ");
          metaEl.style.display = "block";
          metaEl.textContent = `[DEBUG] lang: ${data.meta.lang || "?"} | tipo: ${data.meta.tipo || "?"} | leadSent: ${data.meta.leadSent} | ${items}`;
        }
      } catch (error) {
        typing.remove();
        addMsg(currentCopy().connectError, "error");
        console.error(error);
      }
    }

    msgEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") send();
    });
    sendBtn.addEventListener("click", () => send());
    resetBtn.addEventListener("click", () => send(true));
    langEl.addEventListener("change", () => {
      applyCopy();
      clearChat();
    });

    applyCopy();
    clearChat();
  </script>
</body>
</html>
