<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Navy background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1A40;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B1332;stop-opacity:1" />
    </linearGradient>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2BB57;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A035;stop-opacity:1" />
    </linearGradient>
    <!-- Solar panel gradient -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2D6E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#112259;stop-opacity:1" />
    </linearGradient>
    <!-- Wave gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A6BAD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F4F8A;stop-opacity:1" />
    </linearGradient>
    <!-- Sun gradient -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F5CC60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8872A;stop-opacity:1" />
    </radialGradient>
    <!-- Clip circle for inner content -->
    <clipPath id="innerCircle">
      <circle cx="50" cy="50" r="46"/>
    </clipPath>
  </defs>

  <!-- Outer background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- Gold ring borders -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#goldGrad)" stroke-width="1.8" opacity="0.9"/>
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4"/>

  <!-- === INNER CONTENT (clipped to inner circle) === -->
  <g clip-path="url(#innerCircle)">

    <!-- Inner circle background (slightly lighter navy) -->
    <circle cx="50" cy="50" r="47" fill="#1B2D6E" opacity="0.3"/>

    <!-- === SUN (Back) === -->
    <g transform="translate(50, 32)">
      <!-- Rays -->
      <g fill="url(#goldGrad)">
        <rect x="-1.5" y="-22" width="3" height="7" rx="1.5" />
        <rect x="-1.5" y="-22" width="3" height="7" rx="1.5" transform="rotate(30)" />
        <rect x="-1.5" y="-22" width="3" height="7" rx="1.5" transform="rotate(60)" />
        <rect x="-1.5" y="-22" width="3" height="7" rx="1.5" transform="rotate(90)" />
        <rect x="-1.5" y="-22" width="3" height="7" rx="1.5" transform="rotate(120)" />
        <!-- left side rays -->
        <rect x="-1.5" y="-22" width="3" height="7" rx="1.5" transform="rotate(-30)" />
        <rect x="-1.5" y="-22" width="3" height="7" rx="1.5" transform="rotate(-60)" />
        <rect x="-1.5" y="-22" width="3" height="7" rx="1.5" transform="rotate(-90)" />
        <rect x="-1.5" y="-22" width="3" height="7" rx="1.5" transform="rotate(-120)" />
      </g>
      <!-- Sun Body -->
      <circle cx="0" cy="0" r="13" fill="url(#sunGrad)" />
    </g>

    <!-- === WAVE (Middle) === -->
    <!-- Main back wave -->
    <path d="M -10 60 Q 20 46 50 62 Q 80 78 110 55 L 110 110 L -10 110 Z"
          fill="url(#waveGrad)" opacity="0.95"/>
    <!-- Crest highlight back -->
    <path d="M -10 60 Q 20 46 50 62 Q 80 78 110 55"
          fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Front wave (lighter, on top) -->
    <path d="M -10 65 Q 25 50 55 68 Q 85 85 110 58 L 110 110 L -10 110 Z"
          fill="#1A6BAD" opacity="0.8"/>
    <!-- Crest highlight front -->
    <path d="M -10 65 Q 25 50 55 68 Q 85 85 110 58"
          fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" stroke-linecap="round"/>

    <!-- === SOLAR PANEL (Front Protagonist) === -->
    <g transform="translate(18, 55) rotate(-18)">
      <!-- Panel body shadow/outline to separate from wave background -->
      <rect x="-1" y="-1" width="38" height="26" rx="2.5" fill="rgba(8,16,40,0.5)" />
      
      <!-- Panel body -->
      <rect x="0" y="0" width="36" height="24" rx="2" fill="url(#panelGrad)" />
      <!-- Grid lines horizontal -->
      <line x1="0" y1="8" x2="36" y2="8" stroke="#2A4080" stroke-width="1.2"/>
      <line x1="0" y1="16" x2="36" y2="16" stroke="#2A4080" stroke-width="1.2"/>
      <!-- Grid lines vertical -->
      <line x1="12" y1="0" x2="12" y2="24" stroke="#2A4080" stroke-width="1.2"/>
      <line x1="24" y1="0" x2="24" y2="24" stroke="#2A4080" stroke-width="1.2"/>
      <!-- Panel shimmer highlight -->
      <rect x="0" y="0" width="36" height="24" rx="2" fill="none" stroke="#3A5090" stroke-width="1"/>
      <line x1="3" y1="3" x2="10" y2="3" stroke="#4060A0" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    </g>

  </g>

  <!-- Subtle vignette overlay ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
</svg>
